name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: "npm"

      - name: Install canvas build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev \
            libgif-dev librsvg2-dev libpixman-1-dev \
            pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build (vite)
        run: npm run build

      - name: Setup SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ed25519 "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DOMAIN: bp60years.com
          SOURCE_DIR: dist
        run: |
          # SSH key is rrsync-restricted to /var/www/sites on the server,
          # so the rsync target path is RELATIVE to that root.
          rsync -rltvz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.env*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            "$SOURCE_DIR/" \
            "deploy@$VPS_HOST:$DOMAIN/public/"
